    .carousel{

    .carousel-item {
      flex: 0 0 260px;

      margin: 16px;

      overflow: hidden;
      background: #111;

      display: block;
      border-radius: 14px 14px 0 0;

      color: white;

    }

      font-size: 0.95rem;
      font-weight: 700;
      background: #202325;
    }
    .carousel-item:hover img {
      transform: scale(1.06);
    }

    @keyframes scrollCarousel {
      from {
         transform: translateX(0);
      }
      to {
         transform: translateX(calc(-260px * 8));
      }

<script>
    // Hide the forms on click outside
    document.addEventListener('click', function(e) {
      if (!e.target.classList.contains('cta-btn') && !e.target.closest('form')) {
        document.getElementById('demoForm').style.display = 'none';
        document.getElementById('orderForm').style.display = 'none';
        document.getElementById('contactForm').style.display = 'none';
      }
    });
    // Animate forms (optional) - Universal mailto handler
    document.querySelectorAll("form").forEach(function(form){
    form.addEventListener("submit",function(e){
        e.preventDefault();
        const email = form.dataset.email;
        const subject = form.dataset.subject;

        const fields = form.querySelectorAll("input, textarea");
        const name = fields[0].value;
        const mail = fields[1].value;
        const institution = fields[2].value;
        const message = fields[3].value;
        const body =
            "Name: " + name + "\n" +
            "Email: " + mail + "\n" +
            "Institution / Company: " + institution + "\n" +
            "Message:\n\n" + message;
        window.location.href =
            "mailto:"
            + email
            + "?subject="
            + encodeURIComponent(subject)
            + "&body="
            + encodeURIComponent(body);
        form.reset();
        form.style.display = "none";
    });
    });
</script>

let pos = 0;
let cardIndex = 0;

function randomCards(count){

    let selected = [];
    let pool = [...contentLibrary];

    while(selected.length < count && pool.length > 0){

        let index = Math.floor(Math.random() * pool.length);

        selected.push(pool[index]);

        pool.splice(index,1);
    }

    return selected;
}



function createCard(card){

let box=document.createElement("div");

box.className="dynamic-card";

box.innerHTML=`

<a href="${card.link}">

<img src="${card.image}" loading="lazy">

<div class="dynamic-card-content">

<div class="dynamic-card-title">
${card.title}
</div>

<div class="dynamic-card-text">
${card.text}
</div>

</div>

</a>

`;

return box;

}



function loadMoreCards(initial=false){

    const grid = document.getElementById("dynamicGrid");

    let amount = initial ? 9 : 6;

    randomCards(amount).forEach(card=>{
        grid.appendChild(createCard(card));
    });


    // ???? ??? ??????? ?????? (?? ????????? ????????)
    if(!initial){

        let jumpDistance = 450; // ?????????? ????? ?????
        let startPos = pos;
        let targetPos = pos - jumpDistance;

        let startTime = null;
        let duration = 500; // ???????? ????? (??)


        function fastScroll(time){

            if(!startTime)
                startTime = time;


            let progress = (time - startTime) / duration;


            if(progress < 1){

                let ease = 1 - Math.pow(1-progress,3);

                pos = startPos + 
                      (targetPos - startPos) * ease;

                grid.style.transform =
                    `translateY(${pos}px)`;

                requestAnimationFrame(fastScroll);

            } else {

                pos = targetPos;
            }
        }


        requestAnimationFrame(fastScroll);
    }

}








const grid=document.getElementById("dynamicGrid");



function animateFeed(){

    pos -= 0.3;

    const limit = grid.scrollHeight / 2;

    if(Math.abs(pos) >= limit){
        pos = 0;
    }

    grid.style.transform = `translateY(${pos}px)`;

    requestAnimationFrame(animateFeed);
}



if (window.innerWidth > 700) {
    loadMoreCards(true);
    loadMoreCards();
    loadMoreCards();

grid.innerHTML += grid.innerHTML;
}


animateFeed();





</script>
